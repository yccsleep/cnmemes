<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Warm red background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#c23b22"/>
  <!-- Subtle inner shadow effect -->
  <rect width="32" height="32" rx="7" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <!-- CN text, tight kerning, serif for authority -->
  <text x="16" y="22.5"
        font-family="Georgia, serif"
        font-size="17"
        font-weight="bold"
        fill="white"
        text-anchor="middle"
        letter-spacing="0.5">CN</text>
  <!-- Small red dot accent — like a meme indicator -->
  <circle cx="26" cy="7" r="3.5" fill="#ffd166"/>
</svg>
